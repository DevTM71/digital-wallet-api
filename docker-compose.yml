services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # SQLite gravado no volume nomeado, sobrevivendo a recriações do container.
      # Em produção, troque por um PostgreSQL gerenciado, por exemplo:
      #   DATABASE_URL: "postgresql+psycopg2://usuario:senha@db-host:5432/wallet"
      # (o driver psycopg2 já está no requirements.txt; o EventStore recebe a
      # URL e o SQLAlchemy cuida do dialeto)
      DATABASE_URL: "sqlite:////data/wallet_events.db"
      # Origens permitidas para clientes web, separadas por vírgula
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - wallet_data:/data

volumes:
  wallet_data:
